<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学城美食地图 - 发现身边的美味</title>
    <link rel="stylesheet" href="styles.css?v=7">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo" onclick="switchPage('home')">🍜 美食地图</a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="#" class="nav-link active" onclick="switchPage('home')">首页</a></li>
                <li class="nav-item"><a href="#" class="nav-link" onclick="switchPage('recommend')">趣味推荐</a></li>
                <li class="nav-item"><a href="#" class="nav-link" onclick="switchPage('community')">美食社区</a></li>
                <li class="nav-item"><a href="#" class="nav-link" onclick="switchPage('map')">地图探索</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-content">
        <!-- 首页内容 -->
        <div class="page-content active" id="homePage">
            <div class="container">
                <!-- 头部 -->
                <header class="header">
                    <h1>🍜 大学城美食地图 🍕</h1>
                    <p class="subtitle">✨ 为学生打造的本地美食指南 ✨</p>
                </header>

                <!-- 快速操作栏 -->
                <div class="quick-actions">
                    <button class="btn-primary" onclick="randomRecommend()">🎲 随机推荐</button>
                    <button class="btn-secondary" onclick="toggleFilter()">🔍 筛选美食</button>
                    <button class="btn-primary" onclick="switchPage('recommend')">🎯 趣味推荐</button>
                    <button class="btn-primary" onclick="switchPage('community')">💬 美食社区</button>
                </div>

                <!-- 统计信息 -->
                <div class="stats-section">
                    <div class="stat-card">
                        <div class="stat-number">8</div>
                        <div class="stat-label">精选餐厅</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">4</div>
                        <div class="stat-label">合作高校</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">6</div>
                        <div class="stat-label">美食类型</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">4.6</div>
                        <div class="stat-label">平均评分</div>
                    </div>
                </div>

                <!-- 餐厅列表 -->
                <div class="restaurant-list" id="restaurantList">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 趣味推荐页面 -->
        <div class="page-content" id="recommendPage">
            <div class="container">
                <header class="page-header">
                    <h1>🎯 趣味推荐</h1>
                    <p>多种有趣的方式帮你选择美食</p>
                </header>
                
                <div class="recommend-tabs">
                    <button class="tab-btn active" onclick="switchRecommendTab('wheel')">🎰 转盘推荐</button>
                    <button class="tab-btn" onclick="switchRecommendTab('mystery')">🎁 盲盒惊喜</button>
                </div>

                <div class="tab-content active" id="wheelTab">
                    <div class="spin-wheel-container">
                        <h2>🎰 转盘推荐</h2>
                        <p>转动转盘，让命运为你选择美食！</p>
                        <div class="wheel-wrapper">
                            <div class="wheel" id="wheel">
                                <div class="wheel-pointer">🔽</div>
                            </div>
                        </div>
                        <button class="btn-spin" onclick="spinWheel()">开始转盘</button>
                        <div id="wheelResult" class="selected-result"></div>
                    </div>
                </div>

                <div class="tab-content" id="mysteryTab">
                    <div class="mystery-box-container">
                        <h2>🎁 盲盒惊喜</h2>
                        <p>每日限量3次，点击盒子发现惊喜美食！</p>
                        <div class="daily-limit">
                            今日剩余次数: <span class="remaining-count" id="remainingCount">3</span>
                        </div>
                        <div class="box-grid" id="mysteryBoxes">
                            <!-- 动态生成 -->
                        </div>
                        <button class="btn-reset" onclick="resetMysteryBoxes()">重置盒子</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 美食社区页面 -->
        <div class="page-content" id="communityPage">
            <div class="container">
                <header class="page-header">
                    <h1>💬 美食社区</h1>
                    <p>和同学们分享美食体验</p>
                </header>
                
                <div class="community-filters">
                    <button class="btn-primary" onclick="showPostModal()">📝 发布动态</button>
                </div>

                <div class="community-content" id="communityContent">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 地图探索页面 -->
        <div class="page-content" id="mapPage">
            <div class="container">
                <header class="page-header">
                    <h1>🗺️ 地图探索</h1>
                    <p>在地图上发现周边美食</p>
                </header>
                
                <div class="map-container full-map">
                    <div id="fullMap" class="full-map-view">
                        <div class="map-placeholder">
                            <h3>🗺️ 交互式美食地图</h3>
                            <p>显示大学城周边所有餐厅位置</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 浮动操作按钮 -->
    <div class="floating-action-btn" onclick="switchPage('recommend')" title="快速推荐">
        <span class="fab-icon">🎯</span>
    </div>

    <!-- 餐厅详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('detailModal')">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- 发布动态弹窗 -->
    <div class="modal" id="postModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('postModal')">&times;</span>
            <div class="post-form">
                <h3>📝 发布美食动态</h3>
                <form id="newPostForm" onsubmit="submitPost(event)">
                    <input type="text" id="postTitle" placeholder="标题" required>
                    <textarea id="postContent" placeholder="分享你的美食体验..." required></textarea>
                    <button type="submit" class="btn-primary">发布</button>
                </form>
            </div>
        </div>
    </div>

    <script src="app-complete.js?v=7"></script>
</body>
</html>
