<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>转盘测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #FFD100 0%, #FFA500 50%, #FF8C00 100%);
        }
        .test-container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
        }
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 5px solid white;
            transition: transform 3s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            z-index: 20;
            color: #FF6B9D;
            pointer-events: none;
        }
        button {
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #FF6B9D 0%, #FFA07A 100%);
            color: white;
            cursor: pointer;
            font-weight: 600;
            margin: 10px;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h2>🎰 经典转盘测试</h2>
        <p>测试新的SVG转盘样式</p>
        
        <div class="wheel-container">
            <div class="pointer">🔽</div>
            <div class="wheel" id="wheel">
                <!-- SVG转盘将在这里生成 -->
            </div>
        </div>
        
        <button onclick="testSpin()">🎰 测试转盘</button>
        <button onclick="refreshWheel()">🔄 刷新转盘</button>
        
        <div id="result" style="margin-top: 20px; font-weight: bold; color: #333;"></div>
    </div>

    <script>
        const testRestaurants = [
            { name: '老北京炸酱面馆' },
            { name: '意式披萨店' },
            { name: '日式拉面屋' },
            { name: '韩式炸鸡店' },
            { name: '川味小馆' },
            { name: '海底捞火锅' },
            { name: '煎饼果子摊' },
            { name: '泰式料理店' }
        ];
        
        let currentWheelRestaurants = [...testRestaurants];
        let wheelSpinning = false;

        function refreshWheel() {
            const wheel = document.getElementById('wheel');
            const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#FFB6C1', '#98FB98'];
            
            // 创建经典圆形转盘，使用SVG绘制扇形
            const svgContent = `
                <svg width="100%" height="100%" viewBox="0 0 300 300" style="transform: rotate(-22.5deg);">
                    ${Array.from({length: 8}, (_, index) => {
                        const startAngle = (360 / 8) * index;
                        const endAngle = (360 / 8) * (index + 1);
                        const startRad = (startAngle * Math.PI) / 180;
                        const endRad = (endAngle * Math.PI) / 180;
                        
                        const x1 = 150 + 140 * Math.cos(startRad);
                        const y1 = 150 + 140 * Math.sin(startRad);
                        const x2 = 150 + 140 * Math.cos(endRad);
                        const y2 = 150 + 140 * Math.sin(endRad);
                        
                        const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
                        
                        return `
                            <path d="M 150 150 L ${x1} ${y1} A 140 140 0 ${largeArcFlag} 1 ${x2} ${y2} Z" 
                                  fill="${colors[index % colors.length]}" 
                                  stroke="white" 
                                  stroke-width="3"/>
                        `;
                    }).join('')}
                </svg>
            `;
            
            wheel.innerHTML = svgContent;
            wheel.style.transform = 'rotate(0deg)';
            document.getElementById('result').innerHTML = '';
        }

        function testSpin() {
            if (wheelSpinning) return;
            
            wheelSpinning = true;
            const wheel = document.getElementById('wheel');
            
            const spins = Math.floor(Math.random() * 5) + 5;
            const finalAngle = Math.floor(Math.random() * 360);
            const totalRotation = spins * 360 + finalAngle;
            
            wheel.style.transform = `rotate(${totalRotation}deg)`;
            
            setTimeout(() => {
                const normalizedAngle = (360 - (finalAngle % 360) + 22.5) % 360;
                const sectionAngle = 360 / 8;
                const selectedIndex = Math.floor(normalizedAngle / sectionAngle) % 8;
                
                const selectedRestaurant = currentWheelRestaurants[selectedIndex];
                
                document.getElementById('result').innerHTML = `
                    🎉 转盘结果：<br>
                    <strong>${selectedRestaurant.name}</strong><br>
                    <small>区域 ${selectedIndex + 1} (角度: ${normalizedAngle.toFixed(1)}°)</small>
                `;
                
                wheelSpinning = false;
            }, 3000);
        }

        // 初始化转盘
        refreshWheel();
    </script>
</body>
</html>
